  TANH: 双曲正切函数
  DEGREES: 转角度
  RADIANS: 转弧度
  ABS: 绝对值
  SIGN: 符号函数
  CEIL: 向上取整
  FLOOR: 向下取整
  ROUND: 四舍五入
  EXP: 以 e 为底的指数
  LN: 以 e 为底的对数
  LOG10: 以 10 为底的对数
  SQRT: 求平方根
  compareFunctions: 比较函数
  regexp_like: 评估字符串是否包含正则表达式模式
  greatest: 参数列表中的最大值
  least: 参数列表中的最小值
  stringFunctions: 字符串处理函数
  Length: 返回字符串的长度
  Strops: 返回子字符串在字符串中第一次出现的起始位置
  Startswith: 测试子字符串是否是字符串的前缀
  Endswith: 测试字符串是否以指定的后缀结束
  Concat: 返回字符串 string1、string2、...、stringN 的连接结果
  Substring: 从指定位置提取字符到字符串末尾或从一个字符串中提取从指定位置开始、指定长度的子字符串
  Replace: 从字符串中删除所有 search 的实例或将字符串中所有 search 的实例替换为 replace
  Upper: 将字符串中的字母转换为大写

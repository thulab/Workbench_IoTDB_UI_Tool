searchIotdb:
  aggregate: Aggregation Functions
  sum: Sum
  count: Count Data Points
  avg: Average. Calculates the average value of the data points.
  extreme: >-
    Extreme Value. Returns the value with the largest absolute value. If the
    largest absolute values of positive and negative are equal, it returns the
    positive value.
  maxValue: Maximum Value. Finds the maximum value among the data points.
  minValue: Minimum Value. Finds the minimum value among the data points.
  firstValue: >-
    First Value. Returns the value with the smallest timestamp (i.e., the
    earliest value).
  lastValue: >-
    Last Value. Returns the value with the largest timestamp (i.e., the latest
    value).
  maxTime: >-
    Max Timestamp. Finds the timestamp associated with the latest data point in
    the time series.
  minTime: >-
    Min Timestamp. Finds the timestamp associated with the earliest data point
    in the time series.
  math: Math Functions
  sin: Sine Function
  cos: Cosine Function
  tan: Tangent Function
  asin: Arcsine Function
  acos: Arccosine Function
  atan: Arctangent Function
  sinh: Hyperbolic Sine Function
  cosh: Hyperbolic Cosine Function
  tanh: Hyperbolic Tangent Function
  degrees: Convert to Degrees Function
  radians: Convert to Radians Function
  abs: Absolute Value Function
  sign: Sign Function
  ceil: Round Up Function
  floor: Round Down Function
  round: Round Function
  exp: Exponential Function
  ln: Natural Logarithm Function
  log10: Logarithm Base 10 Function
  sqrt: Square Root Function
  comparison: Comparison Functions
  onOff: Returns true if ts_value >= threshold; otherwise, returns false.
  inRange: >-
    Returns true if ts_value is within the range [lower, upper]; otherwise,
    returns false.
  logical: String Processing Functions
  stringContains: Checks if string contains s
  stringMatches: Checks if string matches the regex
  length: Returns the length of the string
  locate: >-
    Gets the position of the first occurrence of target in the input sequence,
    returns -1 if not contained
  startsWith: Checks if the string starts with a specified prefix
  endsWith: Checks if the string ends with a specified suffix
  concat: Concatenates strings with target
  substr: Get a substring from index start to end - 1.
  upper: Convert the string to uppercase
  lower: Convert the string to lowercase
  trim: Remove leading and trailing spaces from the string
  strcmp: >-
    Compare two input sequences. Returns 0 if the values are the same, a
    negative number if the value of sequence 1 is smaller than sequence 2, and a
    positive number if the value of sequence 1 is larger than sequence 2
  conversion: Data Type Conversion Function
  cast: Convert data to the type specified by the type parameter
  constant: Constant Sequence Generation Function
  const: >-
    Output a user-specified constant sequence based on input attributes value
    and type
  pi: >-
    Value of the constant sequence: the double value of π, the ratio of the
    circumference of a circle to its diameter, equivalent to Math.PI in the Java
    standard library
  e: >-
    Value of the constant sequence: the double value of e, the base of natural
    logarithms, equivalent to Math.E in the Java standard library
  selection: Selection Function
  topK: >-
    Return the k data points with the highest values in a time series. If there
    are more than k data points with equal maximum values, return the one with
    the smallest timestamp
  bottomK: >-
    Return the k data points with the lowest values in a time series. If there
    are more than k data points with equal minimum values, return the one with
    the smallest timestamp
  continuousInterval: Interval Query Function
  zeroDuration: >-
    Return the start time and duration of consecutive false (0) values in a time
    series. The duration t (in ms) satisfies t >= min && t <= max
  nonZeroDuration: >-
    Return the start time and duration of consecutive non-false (non-0) values
    in a time series. The duration t (in ms) satisfies t >= min && t <= max
  zeroCount: >-
    Return the start time and the number of data points following it with
    consecutive false (0) values. The number of data points n satisfies n >= min
    && n <= max
  nonZeroCount: >-
    Return the start time and the number of data points following it with
    consecutive non-false (non-0) values. The number of data points n satisfies
    n >= min && n <= max
  variationTrend: Trend Calculation Function
  timeDifference: >-
    Calculate the difference between the timestamp of a data point and the
    timestamp of the previous data point in a sequence. The first data point
    within the range has no corresponding result output
  difference: >-
    Calculate the difference between the value of a data point and the value of
    the previous data point in a sequence. The first data point within the range
    has no corresponding result output
  nonNegativeDifference: >-
    Calculate the absolute difference between the value of a data point and the
    value of the previous data point in a sequence. The first data point within
    the range has no corresponding result output
  derivative: >-
    Calculate the rate of change of a data point relative to the previous data
    point in a sequence, equivalent to DIFFERENCE / TIME_DIFFERENCE. The first
    data point within the range has no corresponding result output
  nonNegativeDerivative: >-
    Calculate the absolute rate of change of a data point relative to the
    previous data point in a sequence, equivalent to NON_NEGATIVE_DIFFERENCE /
    TIME_DIFFERENCE. The first data point within the range has no corresponding
    result output
  diff: >-
    Calculate the difference between the value of a data point and the value of
    the previous data point in a sequence. The first data point has no
    corresponding result output, and the output value is null
  sample: Sampling Function
  equalSizeBucketRandomSample: Return random sampling of equal-sized buckets that meet the sampling ratio
  equalSizeBucketAggSample: >-
    Return aggregated sampling of equal-sized buckets that meet the sampling
    ratio
  equalSizeBucketM4Sample: Return M4 sampling of equal-sized buckets that meet the sampling ratio
  equalSizeBucketOutlierSample: >-
    Return outlier sampling of equal-sized buckets that meet the sampling ratio
    and the number of samples within the bucket
  m4: >-
    Return the first point (first), last point (last), bottom point (minimum),
    and top point (maximum) within each window. Before outputting aggregated
    points within a window, M4 sorts them in increasing order of timestamps and
    removes duplicates
